<!DOCTYPE html>
<html>
<head>
  <title>Confirmación</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      margin-top: 80px;
      padding: 20px;
      border: 1px solid crimson;
      display: inline-block;
      border-radius: 10px;
    }

    .code {
      color: lime;
      font-weight: bold;
    }

    img {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<h1>🎟️ BOLETO CONFIRMADO</h1>

<div class="box">

  <p id="data"></p>

  <!-- 📱 QR -->
  <img id="qr">

</div>

<script>

// 🧾 datos guardados del ticket
let ticket = localStorage.getItem("ticket");
let name = localStorage.getItem("name");
let total = localStorage.getItem("total");
let code = localStorage.getItem("code");

// 📄 mostrar información en pantalla
document.getElementById("data").innerHTML =
`
👤 Nombre: ${name}<br>
🎟️ Entrada: ${ticket}<br>
💰 Total: $${total}<br><br>
🔐 Código:<br>
<span class="code">${code}</span>
`;

// 🔗 crear link al boleto (IMPORTANTE)
let qrLink =
"boleto.html?tipo=" + ticket +
"&nombre=" + name +
"&total=" + total +
"&codigo=" + code;

// 📱 generar QR que abre la página del boleto
document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="
+ encodeURIComponent(qrLink);

</script>

</body>
</html>
