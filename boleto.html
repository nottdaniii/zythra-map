<!DOCTYPE html>
<html>
<head>
  <title>Boleto</title>

  <style>
    body{
      background:black;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .ticket{
      margin-top:80px;
      display:inline-block;
      padding:20px;
      border:2px solid crimson;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🎟️ BOLETO DIGITAL</h1>

<div class="ticket">
  <p id="info">Cargando...</p>
</div>

<script>
window.onload = function () {

  let params = new URLSearchParams(window.location.search);

  let ticket = params.get("tipo") || "No disponible";
  let name = params.get("nombre") || "Invitado";
  let total = params.get("total") || "0";
  let code = params.get("codigo") || "SIN-CODIGO";

  document.getElementById("info").innerHTML =
  "👤 " + name + "<br>" +
  "🎟️ " + ticket + "<br>" +
  "💰 $" + total + "<br><br>" +
  "🔐 Código:<br>" + code;

};
</script>

</body>
</html>
