<!DOCTYPE html>
<html>
<head>
  <title>Boletos Zythera</title>
  <style>
    body { background:#0b0b0b; color:white; font-family:Arial; text-align:center; }

    .card {
      background:#1f1f1f;
      margin:20px auto;
      padding:20px;
      max-width:600px;
      border-radius:12px;
    }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:crimson;
      color:white;
    }

    input {
      padding:10px;
      width:80%;
      margin:8px;
    }
  </style>
</head>

<body>

<h1>🎟️ Compra de Boletos</h1>

<div class="card">

<button onclick="select('Entrada General',45)">Entrada General - $45</button>
<button onclick="select('VIP del Terror',75)">VIP del Terror - $75</button>
<button onclick="select('Combo del Miedo',35)">Combo del Miedo - $35 c/u</button>
<button onclick="select('Noche Extrema',85)">Noche Extrema - $85</button>
<button onclick="select('Estudiantil',38)">Descuento Estudiantil - $38</button>

<p id="sel">Ninguno seleccionado</p>

<input id="name" placeholder="Nombre">

<input id="qty" type="number" placeholder="Cantidad" value="1" min="1">

<p>Total: $<span id="total">0</span></p>

<br>

<button onclick="buy()">Confirmar</button>

<p id="out"></p>

</div>

<script>
let ticket="";
let price=0;

// seleccionar boleto
function select(t,p){
  ticket=t;
  price=p;
  document.getElementById("sel").innerText=t+" - $"+p;
  actualizarTotal();
}

// actualizar precio en tiempo real
function actualizarTotal(){
  let qty = parseInt(document.getElementById("qty").value) || 1;

  let total = price * qty;

  document.getElementById("total").innerText = total;
}

// detectar cambios en cantidad
document.getElementById("qty").addEventListener("input", actualizarTotal);

// comprar
function buy(){
  let name=document.getElementById("name").value;
  let qty=parseInt(document.getElementById("qty").value) || 1;

  if(!ticket||!name){ alert("Falta info"); return; }

  let total=price * qty;

  let code="ZT-"+Math.floor(Math.random()*99999);

  localStorage.setItem("ticket",ticket);
  localStorage.setItem("name",name);
  localStorage.setItem("total",total);
  localStorage.setItem("code",code);

  window.location="confirmacion.html";
}
</script>

</body>
</html>
